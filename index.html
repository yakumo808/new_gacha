<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホでの入力時ズーム防止とアプリライクな表示のために viewport を調整 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gacha Lab Y</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- SSR演出用スタイル --- */
        /* 1. スクリーンフラッシュ */
        @keyframes flash-anim {
            0% { background-color: rgba(255, 255, 255, 1); opacity: 1; }
            100% { background-color: transparent; opacity: 0; }
        }
        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999;
            animation: flash-anim 0.5s ease-out forwards;
        }
        /* 2. 画面振動 */
        @keyframes shake-anim {
            0% { transform: translate(0, 0); }
            10%, 90% { transform: translate(-2px, -1px); }
            20%, 80% { transform: translate(3px, 2px); }
            30%, 50%, 70% { transform: translate(-5px, -3px); }
            40%, 60% { transform: translate(5px, 3px); }
            100% { transform: translate(0, 0); }
        }
        .shake-effect {
            animation: shake-anim 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        /* 3. SSR画像強調（ポップアップ＆後光） */
        @keyframes pop-in {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1.05); opacity: 1; }
        }
        .result-card.ssr-card {
            animation: pop-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 0 20px 5px rgba(255, 215, 0, 0.8) !important;
            border: 2px solid #ffd700 !important;
            z-index: 100;
        }
        /* 4. 紙吹雪 */
        .confetti {
            position: fixed; top: -10px; width: 10px; height: 10px;
            background-color: #ffd700; z-index: 9998; pointer-events: none;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>
    <button class="btn-help" onclick="openHelp()">❓</button>
    <button id="muteBtn" class="btn-mute" onclick="toggleMute()">🔊</button>
    <button class="btn-settings" onclick="openModal()">⚙</button>

    <div class="container">
        <h1>Gacha Lab <span class="logo-y">Y</span></h1>
        <p id="helpGuide" class="help-guide" onclick="openHelp()"></p>
        
        <div class="user-control">
            <input type="text" id="userName" list="userList" placeholder="名前を入力してガチャ開始" class="name-input">
            <datalist id="userList"></datalist>
            <!-- スマホで押しやすいユーザー履歴選択ボタンエリア -->
            <div id="quickUserSelect" class="quick-select-area"></div>
        </div>

        <div class="display-area" id="displayArea">結果がここに表示されます</div>

        <div class="btn-group">
            <button class="btn-main" onclick="draw(1)">1回引く</button>
            <button class="btn-main btn-ten" onclick="draw(10)">10連ガチャ</button>
        </div>

        <hr>

        <div class="tab-container">
            <h3>データ閲覧</h3>
            <div id="tabs" class="tabs">
                </div>
        </div>

        <div class="summary-section">
            <h4 id="summaryTitle">集計表</h4>
            <!-- サマリーダッシュボード（ここにカードが表示される） -->
            <div id="summaryDashboard" class="summary-dashboard"></div>
            <!-- テーブルをラッパーで囲み、横スクロール可能に -->
            <div class="summary-table-wrapper">
                <table class="summary-table">
                    <thead>
                        <tr><th>景品名</th><th>個数</th><th>実測率</th></tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                    <tfoot id="summaryFoot"></tfoot>
                </table>
            </div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h4>最近の履歴</h4>
                <div class="export-btns">
                    <button onclick="exportExcel()" class="btn-sub">Excel一括出力 (タブ分け)</button>
                </div>
            </div>
            <div class="history-area" id="historyList"></div>
        </div>
        
        <div class="footer-btns" style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
    <button onclick="resetHistory()" class="btn-sub" style="background: #f87171;">履歴・集計をリセット</button>
</div>

    <!-- ヘルプモーダル -->
    <div id="helpModal" class="modal" style="display: none;">
        <div class="modal-content" style="position: relative;">
            <span class="close" onclick="closeHelp()">&times;</span>
            <h2>📖 Gacha Lab Y の使い方</h2>
            
            <div class="help-section">
                <h3>🛠️ 景品セット</h3>
                <p style="font-size: 0.9rem;">⚙️ボタンから名前・画像・確率を設定。確率は自動計算されます。</p>
            </div>
            
            <div class="help-section">
                <h3>🕹️ ガチャ実行</h3>
                <p style="font-size: 0.9rem;">名前を入力してボタンを押すだけ。名前は履歴からクイック選択可能。</p>
            </div>

            <div class="help-section">
                <h3>💎 大当たり演出</h3>
                <p style="font-size: 0.9rem;">確率が一番低い景品を引くと、特別な音と演出が発生します。</p>
            </div>
            
            <div class="help-section">
                <h3>📉 天井機能</h3>
                <p style="font-size: 0.9rem;">設定回数外れると、次の1回で「大当たり」が確定排出されます。</p>
            </div>

            <div class="help-section">
                <h3>📊 データ出力</h3>
                <p style="font-size: 0.9rem;">集計データはExcelでユーザー別にダウンロード可能です。</p>
            </div>

            <button onclick="closeHelp()" class="btn-main" style="width: 100%; margin-top: 10px;">閉じる</button>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content" style="position: relative;">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>景品設定</h2>
            <div id="itemInputs" style="max-height: 400px; overflow-y: auto; margin-bottom: 10px;"></div>
            <button id="saveBtn" class="btn-main" onclick="saveSettings()" style="margin-top:15px; width:100%">保存</button>

            <hr style="border: 0; border-top: 1px solid #2d3748; margin: 20px 0;">
            <button onclick="resetSettings()" class="btn-sub" style="background: #4b5563; width: 100%;">景品設定を初期化</button>
        </div>
    </div>

    <!-- ガチャ音源読み込み -->
    <audio id="gachaSound" src="fanfare.mp3"></audio>
    <audio id="ssrSound" src="ssr_fanfare.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
